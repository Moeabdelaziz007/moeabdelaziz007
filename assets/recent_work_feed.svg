<svg width="720" height="182" viewBox="0 0 720 182" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="cfFeed" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#050505"/>
      <path d="M0,0 L5,5 L10,0 L5,-5 Z M5,5 L10,10 L15,5 L10,0 Z M-5,5 L0,10 L5,5 L0,0 Z M0,10 L5,15 L10,10 L5,5 Z" fill="#0a0a0a"/>
    </pattern>
    <linearGradient id="topBarFeed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39FF14" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#39FF14" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#39FF14" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="scanlineFeed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39FF14" stop-opacity="0"/>
      <stop offset="50%" stop-color="#39FF14" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#39FF14" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="feedClip">
      <rect x="0" y="0" width="720" height="182" rx="10"/>
    </clipPath>
  </defs>

  <rect width="720" height="182" fill="url(#cfFeed)" rx="10"
        stroke="#39FF14" stroke-opacity="0.3" stroke-width="1"/>
  <rect width="720" height="182" fill="#000000" opacity="0.45" rx="10"/>
  <rect width="720" height="3" fill="url(#topBarFeed)" rx="2">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3.4s" repeatCount="indefinite"/>
  </rect>
  <g clip-path="url(#feedClip)">
    <rect x="-180" y="0" width="180" height="182" fill="url(#scanlineFeed)">
      <animateTransform attributeName="transform" type="translate"
                        from="0 0" to="900 0" dur="7.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="30" y="40" font-family="'Consolas','Fira Code',monospace" font-size="11"
        fill="#888888" letter-spacing="3">// LIVE EVENT STREAM</text>
  <text x="30" y="68" font-family="'Consolas','Fira Code',monospace" font-size="22"
        fill="#ffffff" font-weight="600" letter-spacing="2">RECENT WORK FEED</text>
  <circle cx="690" cy="38" r="4" fill="#39FF14">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <text x="678" y="42" font-family="'Consolas',monospace" font-size="10"
        fill="#aaaaaa" text-anchor="end" letter-spacing="1">LIVE</text>
  <line x1="30" y1="82" x2="690" y2="82" stroke="#39FF14" stroke-opacity="0.25" stroke-width="1"/>

  <text x="360.0" y="120" font-family="'Consolas',monospace" font-size="12" fill="#aaaaaa" text-anchor="middle">No recent public activity — awaiting next sync...</text>

  <text x="30" y="168" font-family="'Consolas',monospace" font-size="9"
        fill="#444444" letter-spacing="2">// SOURCE: GITHUB EVENTS API · UPDATED EVERY 3H</text>
</svg>