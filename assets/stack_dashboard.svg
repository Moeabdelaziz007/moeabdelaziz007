<svg width="720" height="450" viewBox="0 0 720 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="cfStack" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#050505"/>
      <path d="M0,0 L5,5 L10,0 L5,-5 Z M5,5 L10,10 L15,5 L10,0 Z M-5,5 L0,10 L5,5 L0,0 Z M0,10 L5,15 L10,10 L5,5 Z" fill="#0a0a0a"/>
    </pattern>
    <linearGradient id="topBarStack" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39FF14" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#39FF14" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#39FF14" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="scanlineStack" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39FF14" stop-opacity="0"/>
      <stop offset="50%" stop-color="#39FF14" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#39FF14" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="stackClip">
      <rect x="0" y="0" width="720" height="450" rx="10"/>
    </clipPath>
  </defs>

  <rect width="720" height="450" fill="url(#cfStack)" rx="10" stroke="#39FF14" stroke-opacity="0.3" stroke-width="1"/>
  <rect width="720" height="450" fill="#000000" opacity="0.45" rx="10"/>
  <!-- Top accent bar: pulses opacity for "live link" feel -->
  <rect width="720" height="3" fill="url(#topBarStack)" rx="2">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3.4s" repeatCount="indefinite"/>
  </rect>
  <!-- Horizontal scanline sweep -->
  <g clip-path="url(#stackClip)">
    <rect x="-180" y="0" width="180" height="450" fill="url(#scanlineStack)">
      <animateTransform attributeName="transform" type="translate"
                        from="0 0" to="900 0" dur="7s" repeatCount="indefinite"/>
    </rect>
  </g>

