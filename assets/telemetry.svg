<svg width="850" height="240" viewBox="0 0 850 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="carbon" width="10" height="10" patternUnits="userSpaceOnUse">
        <rect width="10" height="10" fill="#050505"/>
        <path d="M0,0 L5,5 L10,0 L5,-5 Z" fill="#0a0a0a"/>
    </pattern>
    <linearGradient id="scanline" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#39FF14" stop-opacity="0"/>
        <stop offset="50%" stop-color="#39FF14" stop-opacity="0.1"/>
        <stop offset="100%" stop-color="#39FF14" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#carbon)" rx="15" stroke="#39FF14" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- Scanline Effect -->
  <rect width="100%" height="40" fill="url(#scanline)">
    <animate attributeName="y" from="-40" to="240" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- HUD Decorative elements -->
  <path d="M 20 20 L 60 20 L 60 40 M 830 20 L 790 20 L 790 40 M 20 220 L 60 220 L 60 200 M 830 220 L 790 220 L 790 200" fill="none" stroke="#39FF14" stroke-width="2" opacity="0.6"/>

  <g font-family="'Consolas', 'Fira Code', monospace" text-anchor="middle">
    <!-- Header -->
    <text x="425" y="35" font-size="12" fill="#888888" letter-spacing="4" font-weight="bold">AXIOMID ROOT AUTHORITY TELEMETRY</text>
    <line x1="150" y1="45" x2="700" y2="45" stroke="#39FF14" stroke-opacity="0.3"/>

    <!-- Metrics Swarm -->
    <g transform="translate(130, 120)">
        <circle r="50" fill="none" stroke="#39FF14" stroke-dasharray="4 2" stroke-opacity="0.2"/>
        <text y="-10" font-size="10" fill="#888888">CITIZENS</text>
        <text y="20" font-size="28" fill="#ffffff" font-weight="bold" filter="url(#glow)">16,436</text>
        <text y="40" font-size="8" fill="#39FF14" opacity="0.8">L0_IDENTITIES</text>
    </g>

    <g transform="translate(330, 120)">
        <rect x="-50" y="-50" width="100" height="100" fill="none" stroke="#00d4ff" stroke-dasharray="4 4" stroke-opacity="0.2"/>
        <text y="-10" font-size="10" fill="#888888">DIDs_ISSUED</text>
        <text y="20" font-size="28" fill="#ffffff" font-weight="bold" filter="url(#glow)">5,411</text>
        <text y="40" font-size="8" fill="#00d4ff" opacity="0.8">AGENT_PASSORTS</text>
    </g>

    <g transform="translate(530, 120)">
        <path d="M-40 -40 L40 -40 L50 -30 L50 40 L-40 40 Z" fill="none" stroke="#ffffff" stroke-opacity="0.1"/>
        <text y="-10" font-size="10" fill="#888888">SETTLEMENTS</text>
        <text y="20" font-size="28" fill="#ffffff" font-weight="bold">43,582</text>
        <text y="40" font-size="8" fill="#888888" opacity="0.8">M2M_PI_TOKEN</text>
    </g>

    <g transform="translate(730, 120)">
        <text y="-10" font-size="10" fill="#888888">ENTROPY</text>
        <text y="20" font-size="28" fill="#8b5cf6" font-weight="bold" filter="url(#glow)">0.9249</text>
        <text y="40" font-size="8" fill="#8b5cf6" opacity="0.8">SYS_STABILITY</text>
        <rect x="-30" y="45" width="60" height="3" fill="#0a0a0a"/>
        <rect x="-30" y="45" width="55.494" height="3" fill="#8b5cf6"/>
    </g>
  </g>

  <!-- System Logs Simulator -->
  <text x="425" y="210" font-size="8" fill="#444444" text-anchor="middle">
    AUTH: OK // SYNC: ACTIVE // HEARTBEAT: 124ms // ENCRYPTION: Ed25519_SIG // 2026-06-18 19:14:01 UTC
  </text>

  <!-- Online Pulsar -->
  <circle cx="25" cy="25" r="4" fill="#39FF14">
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>