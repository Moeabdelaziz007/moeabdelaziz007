name: Generate Snake

on:
  # يعمل تلقائياً كل 24 ساعة (منتصف الليل)
  schedule:
    - cron: "0 0 * * *" 
  
  # يسمح لك بتشغيله يدوياً في أي وقت للتجربة
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    
    permissions: 
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          # اسم المستخدم (يأخذه تلقائياً)
          github_user_name: ${{ github.repository_owner }}
          
          # يولد ملفين: واحد عادي وواحد مخصص للوضع الليلي ليتناسب مع تصميمك
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Upload Snake SVGs
        uses: actions/upload-artifact@v4
        with:
          name: snake-svgs
          path: dist/
          retention-days: 1

  publish:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: generate

    permissions:
      contents: write

    steps:
      - name: Download Snake SVGs
        uses: actions/download-artifact@v4
        with:
          name: snake-svgs
          path: dist

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          # نستخدم التوكن التلقائي للنظام
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
