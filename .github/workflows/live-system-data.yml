name: Live System Data Updater

on:
  schedule:
    - cron: "0 */6 * * *" # Runs every 6 hours
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Dynamic Data
        run: python scripts/update_system_status.py

      - name: Commit Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md assets/
          git diff --quiet && git diff --staged --quiet || git commit -m "[Automated] Update live system metrics"
          git push
