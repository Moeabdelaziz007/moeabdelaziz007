name: Live System Data Updater

on:
  schedule:
    - cron: "0 */3 * * *" # Runs every 3 hours
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-readme:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PYTHONPATH: ${{ github.workspace }}/scripts
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Refresh telemetry banner
        run: python scripts/update_system_status.py

      - name: Generate agents inventory
        run: python scripts/generate_agents_inventory.py

      - name: Generate contribution heatmap
        run: python scripts/generate_contribution_heatmap.py

      - name: Generate recent work feed
        run: python scripts/generate_recent_work_feed.py

      - name: Commit Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md assets/
          git diff --quiet && git diff --staged --quiet || git commit -m "[Automated] Update AxiomID live dashboards and telemetry"
          git push
