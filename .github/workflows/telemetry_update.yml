name: Update System Telemetry

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-telemetry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Execute Dashboard Generation Script
        run: python3 scripts/generate_aix_dashboard.py

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md assets/aix_dashboard.svg
          git commit -m "chore(telemetry): update system telemetry dashboard [skip ci]" || echo "No changes to commit"
          git push
